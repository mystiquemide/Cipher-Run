    <script>
      // Fix for whatwg-fetch/cross-fetch attempting to overwrite window.fetch
      (function() {
        try {
          const originalFetch = window.fetch;
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch') || Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
          if (descriptor && descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn("Prevented overwrite of window.fetch"); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.error("Error fixing fetch descriptor:", e);
        }
      })();
    </script>
